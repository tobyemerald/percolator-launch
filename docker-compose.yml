services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "4000:4000"
    env_file: .env
    restart: unless-stopped
    depends_on:
      - indexer
    networks:
      - percolator

  indexer:
    build:
      context: .
      dockerfile: Dockerfile.indexer
    env_file: .env
    restart: unless-stopped
    networks:
      - percolator

  oracle-keeper:
    build:
      context: .
      dockerfile: Dockerfile.oracle-keeper
    env_file: .env
    restart: unless-stopped
    networks:
      - percolator

networks:
  percolator:
    driver: bridge
